name = "criteria_builder"
description = "Read-only helper that extracts task-relevant evaluation criteria from conventions, decisions, and intent artifacts."
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
sandbox_mode = "read-only"
developer_instructions = """
Stay in extraction mode.
Read .goose/conventions.yaml, .goose/decisions.yaml when present, and the current branch's intent artifact under .goose/artifacts/ when available.
Return only task-relevant criteria candidates, concrete criterion IDs, and concise notes about ambiguity.
Do not edit source files.
Do not make final user-facing decisions about what to keep; the parent agent owns the final criteria.md synthesis.
"""
